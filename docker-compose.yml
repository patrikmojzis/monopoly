services:
  monopoly:
    build: .
    ports:
      - "${HOST_BIND:-127.0.0.1}:${HOST_PORT:-8000}:8000"
    environment:
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:8000}
      MONOPOLY_DB_PATH: /data/monopoly.sqlite3
      WEB_DIST_DIR: /app/web/dist
    volumes:
      - monopoly_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  monopoly_data:
